---
- name: Download K3s install script
  ansible.builtin.get_url:
    url: https://get.k3s.io
    dest: /tmp/k3s_install.sh
    mode: '0755'

- name: Install K3s server
  ansible.builtin.shell: |
    INSTALL_K3S_EXEC="server \
      --disable traefik \
      --disable servicelb \
      --tls-san {{ ansible_host }}" \
    sh /tmp/k3s_install.sh
  args:
    creates: /usr/local/bin/k3s

- name: Wait for K3s to start
  ansible.builtin.systemd:
    name: k3s
    state: started
    enabled: true

- name: Get K3s node token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token

- name: Print node token
  ansible.builtin.debug:
    msg: "K3s token is: {{ k3s_token.content | b64decode | trim }}"

- name: Read and fix kubeconfig on server
  ansible.builtin.shell: |
    cat /etc/rancher/k3s/k3s.yaml | \
    sed 's|https://127.0.0.1:6443|https://{{ ansible_host }}:6443|g' | \
    sed 's|https://localhost:6443|https://{{ ansible_host }}:6443|g'
  register: kubeconfig_content

- name: Write fixed kubeconfig to local machine
  delegate_to: localhost
  become: false
  ansible.builtin.shell: |
    mkdir -p ~/.kube
    cat > ~/.kube/config << 'KUBEEOF'
    {{ kubeconfig_content.stdout }}
    KUBEEOF
    chmod 600 ~/.kube/config